<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>GM管理系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="__PUBLIC__/lib/jquery-1.11.1.min.js" type="text/javascript"></script>
    <script src="__PUBLIC__/lib/jquery.cookie.js" type="text/javascript"></script>
    <style type="text/css">
        body{
            background-image: url("__PUBLIC__/images/index_bg.jpg");
            background-size: 100%;
            font-family: "微软雅黑";
        }
        .header{
            padding-left: 3em;
            padding-top: 3em;
        }
        .title{
            font-size: 14px;
        }
        .button{
            margin-left: 10em;width: 150px;height: 40px;margin-top: 1em;
            border: 1px solid #fff;
            color: #fff;
            border-radius: 2px;
            font-size: 20px;
            background-color: #00b38a;
        }
        .inputDiv{
            padding-left: 5em;padding-top: 3em;
        }
        .mainDiv{
            width: 550px;height: 300px;margin-left: auto;margin-right: auto;margin-top: 8em;
        }
        .input{
            border: 1px solid #908c8c;
            border-width: 1px;
            border-radius: 2px;
            padding-left: 10px;
            height: 30px;
            width: 250px;
            outline: 0;
        }
    </style>
</head>

<body>
<div class="header">
    <b class="title"></b>
</div>
<div style="text-align: center;margin-top: 1em;">
    <img src="__PUBLIC__/images/logo.png" width="226px" height="266.5px" align="left">
    <b style="font-size: 40px;" align="center">GM管理系统</b>
</div>
<div class="mainDiv">
    <div class="inputDiv">
        <span style="font-size: 20px;padding-right:2em;">用户名：</span><input type="text" class="input" placeholder="请输入用户名" id="name">
    </div>
    <div class="inputDiv">
        <span style="font-size: 20px;padding-right:3em;">密码：</span><input type="password" class="input" placeholder="请输入密码" id="pwd">
    </div>
    <div class="inputDiv">
        <span style="font-size: 20px;padding-right:2.7em;">平台：</span>
        <select class="input" id="platform">CeShi
            <option value="CeShi">测试</option>
            <option value="WanBa">手Q玩吧</option>
            <option value="YunGe">云歌</option>
            <option value="WeiXin">微信</option>
            <option value="YYB">应用宝</option>
            <option value="QuDao">渠道</option>
            <option value="TYTS">提审</option>
        </select>
    </div>
    <div style="padding-top: 2em;padding-left: 12em;">
        <input type="checkbox" id="rememberPwd">记住密码
    </div>
    <button class="button" id="btn">登录</button>
</div>
</body>
</html>
<script type="application/javascript">
    function localHref(){
        var href = window.location.href;
        if(href.indexOf("?")>0){
            return href.substr(0,href.lastIndexOf("/"))+"/main";
        }else{
            return href + "?s=/Home/index/main";
        }
    }
    $("#btn").click(function(){
        saveUserInfo();
        var name = $("#name").val();
        var pwd = $("#pwd").val();
        var plat = $("#platform").val();
        if(name.length == 0 || pwd.length == 0){
            alert("请输入用户名或密码！");
        }else{
            $.ajax({
                url:"__MODULE__/Index/login",
                data:{username:name,password:pwd,platform:plat},
                type:"POST",
                success:function(msg){
                    if(msg.status == 0){
                        alert(msg.info);
                    }else{
                        window.location.href = localHref();
                    }
                },
                error:function(){
                    alert("服务器错误！");
                }
            })
        }
    });
    window.onload = function () {
        document.getElementsByTagName("body")[0].onkeydown = function () {
            if (event.keyCode == 13) {
                saveUserInfo();
                $("#btn").click();
            }
        }
    }
    //初始化页面时验证是否记住了密码
    $(document).ready(function() {
        if ($.cookie("rememberPwd")) {
            $("#rememberPwd").prop("checked", true);
            $("#name").val($.cookie("userName"));
            $("#pwd").val($.cookie("passWord"));
        }
    });
    //保存用户信息
    function saveUserInfo() {
        if ($("#rememberPwd").prop("checked")) {
            var userName = $("#name").val();
            var passWord = $("#pwd").val();
            $.cookie("rememberPwd", true, { expires: 7 }); // 存储一个带7天期限的 cookie
            $.cookie("userName", userName, { expires: 7 }); // 存储一个带7天期限的 cookie
            $.cookie("passWord", passWord, { expires: 7 }); // 存储一个带7天期限的 cookie
        }
        else {
            $.cookie("rememberPwd", false, { expires: -1 });
            $.cookie("userName", '', { expires: -1 });
            $.cookie("passWord", '', { expires: -1 });
        }
    }
    /*$.cookie('the_cookie'); // 读取 cookie
     $.cookie('the_cookie', 'the_value'); // 存储 cookie
     $.cookie('the_cookie', 'the_value', { expires: 7 }); // 存储一个带7天期限的 cookie
     $.cookie('the_cookie', '', { expires: -1 }); // 删除 cookie*/
</script>

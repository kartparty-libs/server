<div class="header">
    <h1 class="page-title">{$Think.lang.batch_player_top_info}</h1>
</div>
<div class="col-md-12 ">
    <div class="col-md-5" style="margin-top: 1em;">
        <div class="col-md-3" style="padding-top: 2em;">{$Think.lang.batch_player_names}</div>
        <div class="col-md-7">
            <textarea style="width: 25em; height: 6em;resize: none" class="form-control" id="userNames" name="msg"
                      placeholder="{$Think.lang.batch_player_input_tip}" name="content"></textarea>
        </div>
        <div class="col-md-2">
            <button class="btn btn-success" id="batch" style="margin-top: 2em;"> {$Think.lang.batch_player_btn_search}</button>
        </div>
    </div>
</div>
<div class="col-xs-12">
    <div class="table-responsive">
        <input type="hidden" id="roleOpenId" value="">
        <table id="sample-table-1" class="table table-striped table-bordered table-hover">
            <thead>
            <tr>
                <th>{$Think.lang.common_role_id}</th>
                <th>{$Think.lang.common_role_name}</th>
                <th>{$Think.lang.common_serverid}</th>
                <th>{$Think.lang.common_user_openid}</th>
                <th>{$Think.lang.common_control}</th>
            </tr>
            </thead>

            <tbody class="players">
            </tbody>
        </table>
    </div><!-- /.table-responsive -->
</div>
<script type="application/javascript">
    $("#batch").click(function () {
        if($("#userNames").val().length == 0 ){
            alert("{$Think.lang.tip_input_player_name}");
            return;
        }
        $.ajax({
            url: "__MODULE__/GmManage/getPlayersByName",
            data:{userNames:$.trim($("#userNames").val())},
            success: function (msg) {
                if(msg.ret==0){
                    $(".players").html("");
                    var userInfo = msg.list;
                    if(userInfo.length > 0){
                        for (var i = 0; i < userInfo.length; i++) {
                            var html = "<tr><td>" + userInfo[i][1].roleid + "</td><td>" + userInfo[i][1].rolename + "</td> <td>" + userInfo[i][1].serverid + "</td><td>"
                                    + userInfo[i][1].pfid+"</td><td>";
                                    // "<input class='btn btn-danger' onclick=manage('banopenid','"+userInfo[i].openid+"',"+i+") type='button' value='{$Think.lang.manage_ban_openid}'>"+
                                    // "<input class='btn btn-danger' onclick=manage('blackroom','"+userInfo[i].openid+"',"+i+") style='margin-left: 1em;' type='button' value='{$Think.lang.manage_blackroom_openid}'>"+
                                    // "<span style='padding-left: 1em;'><input min='1' type='number' id='sec_"+i+"' placeholder='{$Think.lang.ban_openid_input_tip}'>{$Think.lang.common_hours}</span></td></tr>";
                            $(".players").append(html);
                        }
                    }else{
                        alert("{$Think.lang.batch_no_player}");
                    }
                }else{
                    alert(msg.msg);
                }

            },
            error: function () {
                alert('{$Think.lang.tip_search_player_error}');
            }
        });
    });
    function manage(str,openid,i){
        console.log($("#sec_"+i).val());
        if($("#sec_"+i).val().length == 0){
            alert("{$Think.lang.tip_input_ban_time}");
            return;
        }
        if(openid.length>0){
            $.ajax({
                url: "__MODULE__/GmManage/manageByOpenid",
                data:{openid:openid,manage:str,sec:$("#sec_"+i).val()},
                success: function (msg) {
                    if (msg.ret == 0) {
                        console.log(msg);
                        if(str == "blackRoom"){
                            alert("{$Think.lang.tip_blackroom_success}");
                        }else{
                            alert("{$Think.lang.tip_ban_account_success}");
                        }
                    } else {
                        alert(msg.msg);
                    }
                },
                error: function () {
                    alert('{$Think.lang.tip_manage_error}');
                }
            });
        }else{
            alert("{$Think.lang.tip_input_player_name}");
        }
    }
</script>

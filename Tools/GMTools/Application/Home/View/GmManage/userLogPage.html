<div class="header">
    <h1 class="page-title">{$Think.lang.user_log_page}</h1>
</div>
<div class="col-sm-12 padding-bottom">
    <div class="col-lg-3 col-sm-6 col-xs-6 padding-top">
        <span class="col-lg-5 col-sm-4">{$Think.lang.user_log_db}:</span>
        <select id="logdb" class="select2-container col-lg-7 col-sm-8" data-placeholder="Choose a item..." name="logdb">
            <option value="logdb_game">logdb_game</option>
            <option value="logdb_game1">logdb_game1</option>
            <option value="logdb_game2">logdb_game2</option>
            <option value="logdb_game3">logdb_game3</option>
            <option value="logdb_game4">logdb_game4</option>
        </select>
    </div>
    <div class="col-lg-3 col-sm-6 col-xs-6 padding-top">
        <span class="col-lg-5 col-sm-4">{$Think.lang.user_log_type}:</span>
        <select id="logType" class="select2-container col-lg-7 col-sm-8" data-placeholder="Choose a item..."
                name="item">
            <option value="">&nbsp;</option>
            <volist name="tables" id="table">
                <option value="{$table.tableName}">
                    <if condition="$table.tableDesc eq ''">
                        {$table.tableName}
                        <else/>
                        {$table.tableDesc}
                    </if>
                </option>
            </volist>
        </select>
    </div>
    <div class="col-lg-2 col-sm-6 col-xs-6 padding-top">
        <span class="col-lg-5 col-sm-4" id="optlab">{$Think.lang.common_role_id}:</span>
        <input id="roleId" type="text" class="col-lg-7 col-sm-8">
    </div>
    <div class="col-lg-2 col-sm-6 col-xs-6 padding-top">
        <span class="col-lg-5 col-sm-4">{$Think.lang.common_start_time}:</span>
        <input class="date-picker col-lg-7 col-sm-8" id="startTime" name="startTime" data-date-format="yyyy-mm-dd"
               type="text" readonly>
    </div>
    <div class="col-lg-2 col-sm-6 col-xs-6 padding-top">
        <span class="col-lg-5 col-sm-4">{$Think.lang.common_end_time}:</span>
        <input class="date-picker col-lg-7 col-sm-8" id="endTime" name="endTime" data-date-format="yyyy-mm-dd"
               type="text" readonly>
    </div>
</div>
<div class="col-sm-12 padding-bottom">
    <div class="col-lg-4 col-sm-6 col-xs-6 padding-top">
        <span class="col-lg-3 col-sm-4">{$Think.lang.user_log_use_type}:</span>
        <select class="chosen-select" data-placeholder="" style="display: none;" id="type">
            <option value="">&nbsp;</option>
            <volist name="Think.session.usage_type" id="usage">
                <option value="{$usage.idx}">{$usage.type_name}(#{$usage.idx})</option>
            </volist>
        </select>
    </div>
    <div class="col-lg-4 col-sm-6 col-xs-6 padding-top" id="itemSelect">
        <span class="col-lg-3 col-sm-4">{$Think.lang.user_log_use_item}:</span>
        <select class="chosen-select" data-placeholder="" style="display: none;width: 350px   ;" id="item">
            <option value="">&nbsp;</option>
            <volist name="Think.session.items" id="item">
                <option value="{$item.itemid}">{$item.itemname}(#{$item.itemid})</option>
            </volist>
        </select>
    </div>
    <div class="col-lg-2 col-sm-6 col-xs-6 padding-top">
        <input class="btn btn-primary col-lg-8 col-sm-6" value="{$Think.lang.user_log_btn_search}" id="searchLog"
               type="button">
    </div>
</div>
<div class="col-lg-11 col-xs-12 col-sm-12">
    <div class="">
        <table id="sample-table-1" class="table table-striped table-bordered table-hover">
            <thead>
            <tr id="head">
            </tr>
            </thead>
            <tbody id="row">
            </tbody>
        </table>
    </div>
    <div class="center" id="pageContent">
    </div>

</div>
<script type="application/javascript">
    $("input[name$='Time']").datetimepicker({format:'yyyy/mm/dd hh:ii:ss'});
    $("#type").chosen({search_contains:true});
    $("#item").chosen({search_contains:true});
    $("#itemSelect").hide();
    $("#searchLog").click(function () {
        if ($("#roleId").val() == "") {
            alert("{$Think.lang.tip_input_role_id}");
        } else {
            getLog(1);
        }
    });
    function pageHtml(page, pageCount, count) {
        page = parseInt(page);
        $("#pageContent").html("{$Think.lang.page_tip1}" + pageCount + "{$Think.lang.page_tip2}&nbsp;" + count +
                "{$Think.lang.page_tip3}&nbsp;&nbsp;{$Think.lang.page_tip4}"+ page +
                "{$Think.lang.page_tip1}&nbsp;&nbsp; <a onclick='page(" + (page - 1) +
                ")'>{$Think.lang.page_tip5}</a>&nbsp;&nbsp; <a onclick='page(" + (page + 1) + ")'>{$Think.lang.page_tip6}</a>")
    }
    function page(pageNum) {
        getLog(pageNum);
    }
    $("#logType").change(function () {
        $("#itemSelect").hide();
        if ($(this).val() == "log_guild") {
            $("#optlab").html("{$Think.lang.user_guild_id}:");
        } else if ($(this).val() == "log_item") {
            $("#itemSelect").show();
        } else {
            $("#optlab").html("{$Think.lang.common_role_id}:");
        }
    });
    function getLog(page) {
        $.ajax({
            url:"__MODULE__/GmManage/getUserLog/tableName",
            data:{
                logType:$("#logType").val(),
                roleId:$("#roleId").val(),
                start:$("#startTime").val(),
                end:$("#endTime").val(),
                db:$("#logdb").val(),
                usageType:$("#type").val(),
                itemId:$("#item").val(),
                page:page
            },
            success:function (msg) {
                if (msg.length == 0) {
                    return;
                }
                $("#head").html("");
                $("#row").html("");
                $("#pageContent").html("");
                for (var i = 0; i < msg["col"].length; i++) {
                    $("#head").append("<th>" + msg["col"][i].Field + "</th>");
                }
                if (msg["result"] == null) {
                    return;
                }
                for (var i = 0; i < msg["result"].length; i++) {
                    var str = "<tr>";
                    $.each(msg["result"][i], function (name, value) {
                        if (name.indexOf("ts") >= 0 && name != "playtime") {
                            value = formatDate(new Date(value * 1000));
                        }
                        if (name == "enumid" || name == 'itemid') {
                            var enumArr = {$Think.session.enum
                        }
                        ;
                        if (typeof(enumArr[value]) != 'undefined') {
                            value = enumArr[value];
                        }
                    }
                    if (name == "type") {
                        if (typeof(msg["usageType"][value]) != 'undefined') {
                            value = msg["usageType"][value];
                        }
                    }
                    if ($("#logType").val() == "log_mail") {
                        if (name == "state") {
                            value = value == 1 ? "{$Think.lang.mail_open}" : "{$Think.lang.mail_delete}";
                        }
                        if (name == "award") {
                            var enumArr = {$Think.session.enum
                        }
                        ;
                        if (value != "" && value.length > 0) {
                            if (value.indexOf(";") > 0) {
                                var itemArr = value.split(";");
                                for (var j = 0, len = itemArr.length; j < len; j++) {
                                    var arr = itemArr[j].split(",");
                                    arr[0] = "{$Think.lang.item_name}:" + (typeof (enumArr[arr[0]]) == "undefined" ? arr[0] : enumArr[arr[0]]);
                                    arr[1] = "{$Think.lang.common_number}:" + arr[1];
                                    arr[2] = arr[2] == 1 ? "{$Think.lang.item_bind}" : "{$Think.lang.item_unbind}";
                                    itemArr[j] = arr.join();
                                }
                                value = itemArr.join(";");
                            } else {
                                var arr = value.split(",");
                                arr[0] = "{$Think.lang.item_name}:" + (typeof (enumArr[arr[0]]) == "undefined" ? arr[0] : enumArr[arr[0]]);
                                arr[1] = "{$Think.lang.common_number}:" + arr[1];
                                arr[2] = arr[2] == 1 ? "{$Think.lang.item_bind}" : "{$Think.lang.item_unbind}";
                                value = arr.join();
                            }
                        }
                    }
                }
                str += "<td>" + value + "</td>";
            });

        $("#row").append(str + "</tr>");
    }
    if (msg["col"].length > 0) {
        pageHtml(msg["page"], msg["pageCount"], msg["count"]);
    }
    },
    error: function () {
        alert('{$Think.lang.user_log_err}');
    }
    })
    ;
    }
    function formatDate(now) {
        var year = now.getYear() + 1900;
        var month = now.getMonth() + 1;
        var date = now.getDate();
        var hour = now.getHours();
        hour = hour < 10 ? "0" + hour : hour;
        var minute = now.getMinutes();
        minute = minute < 10 ? "0" + minute : minute;
        var second = now.getSeconds();
        second = second < 10 ? "0" + second : second;
        return year + "/" + month + "/" + date + " " + hour + ":" + minute + ":" + second;
    }
</script>
